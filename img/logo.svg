<svg viewBox="0 0 400 410" xmlns="http://www.w3.org/2000/svg" width="200" height="205">
  <rect width="400" height="400" fill="transparent" style="fill:rgba(0, 0, 0, 0);stroke:none;color:rgb(108, 99, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Circular border -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#6C63FF" stroke-width="18" style="fill:none;stroke:rgb(108, 99, 255);color:rgb(108, 99, 255);stroke-width:18px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Leads on left and right -->
  <line x1="22" y1="200" x2="88" y2="200" stroke="#6C63FF" stroke-width="18" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(108, 99, 255);color:rgb(108, 99, 255);stroke-width:18px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="312" y1="200" x2="378" y2="200" stroke="#6C63FF" stroke-width="18" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(108, 99, 255);color:rgb(108, 99, 255);stroke-width:18px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Bold zigzag resistor — bigger, fewer peaks for clarity at small size -->
  <polyline points="88,200 112,138 148,262 184,138 220,262 256,138 292,262 312,200" fill="none" stroke="#6C63FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(108, 99, 255);color:rgb(108, 99, 255);stroke-width:18px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>